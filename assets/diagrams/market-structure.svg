<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">上涨与下跌市场结构</title>
  <desc id="desc">左侧展示更高高点和更高低点，右侧展示更低低点和更低高点。</desc>
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#0f766e"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#b91c1c"/></marker>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="50" y="52" font-family="Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#0f172a">市场结构：先识别摆动，再讨论信号</text>
  <rect x="45" y="85" width="535" height="385" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="75" y="128" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#0f766e">上涨结构：HH + HL</text>
  <line x1="85" y1="410" x2="535" y2="410" stroke="#e2e8f0"/>
  <polyline points="95,380 185,255 255,325 355,170 425,250 535,105" fill="none" stroke="#0f766e" stroke-width="6" stroke-linejoin="round" marker-end="url(#arrowGreen)"/>
  <circle cx="185" cy="255" r="7" fill="#0f766e"/><circle cx="255" cy="325" r="7" fill="#0f766e"/><circle cx="355" cy="170" r="7" fill="#0f766e"/><circle cx="425" cy="250" r="7" fill="#0f766e"/>
  <text x="163" y="235" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">HH₁</text><text x="238" y="355" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">HL₁</text>
  <text x="334" y="150" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">HH₂</text><text x="407" y="280" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">HL₂</text>
  <line x1="215" y1="255" x2="535" y2="255" stroke="#94a3b8" stroke-dasharray="8 7"/>
  <text x="90" y="445" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#475569">受保护低点未失守：优先等待回调做多</text>
  <rect x="620" y="85" width="535" height="385" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="650" y="128" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#b91c1c">下跌结构：LL + LH</text>
  <line x1="660" y1="410" x2="1110" y2="410" stroke="#e2e8f0"/>
  <polyline points="670,125 760,255 830,180 930,330 1000,250 1110,405" fill="none" stroke="#b91c1c" stroke-width="6" stroke-linejoin="round" marker-end="url(#arrowRed)"/>
  <circle cx="760" cy="255" r="7" fill="#b91c1c"/><circle cx="830" cy="180" r="7" fill="#b91c1c"/><circle cx="930" cy="330" r="7" fill="#b91c1c"/><circle cx="1000" cy="250" r="7" fill="#b91c1c"/>
  <text x="738" y="285" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">LL₁</text><text x="812" y="160" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">LH₁</text>
  <text x="908" y="360" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">LL₂</text><text x="982" y="230" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#0f172a">LH₂</text>
  <line x1="790" y1="255" x2="1110" y2="255" stroke="#94a3b8" stroke-dasharray="8 7"/>
  <text x="665" y="445" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#475569">受保护高点未突破：优先等待反弹做空</text>
</svg>
