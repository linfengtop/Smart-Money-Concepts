<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">BTC 多周期决策框架</title>
  <desc id="desc">从四小时环境、一小时场景到十五分钟触发，并以五分钟作为可选精细化。下方展示失效点、目标与时间止损共同决定持仓。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef7f5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5fa5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#17385f" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="34" font-weight="700" fill="#17385f">BTC 多周期决策框架</text>
  <text x="600" y="98" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#46627f">周期负责分工；入场依靠序列；持仓由失效与目标决定</text>

  <g filter="url(#shadow)">
    <rect x="65" y="150" width="245" height="230" rx="22" fill="#1d406c"/>
    <rect x="350" y="150" width="245" height="230" rx="22" fill="#2f5fa5"/>
    <rect x="635" y="150" width="245" height="230" rx="22" fill="#14827b"/>
    <rect x="920" y="150" width="215" height="230" rx="22" fill="#ffffff" stroke="#8fb2c8" stroke-width="3"/>
  </g>

  <text x="187" y="198" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#ffffff">4H 环境</text>
  <text x="187" y="236" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#dcecff">方向与目标</text>
  <text x="90" y="284" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• 趋势 / 区间 / 转换</text>
  <text x="90" y="318" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• 两侧外部流动性</text>
  <text x="90" y="352" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• Premium / Discount</text>

  <text x="472" y="198" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#ffffff">1H 场景</text>
  <text x="472" y="236" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#dcecff">位置与路径</text>
  <text x="375" y="284" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• 关键位置与结构</text>
  <text x="375" y="318" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• 预期 Sweep 位置</text>
  <text x="375" y="352" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#ffffff">• 场景失效条件</text>

  <text x="757" y="198" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="700" fill="#ffffff">15M 触发</text>
  <text x="757" y="236" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" fill="#dcf6f2">序列与执行</text>
  <text x="660" y="276" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#ffffff">1. Sweep</text>
  <text x="660" y="306" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#ffffff">2. Displacement</text>
  <text x="660" y="336" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#ffffff">3. MSS</text>
  <text x="660" y="366" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#ffffff">4. 首次回踩 FVG</text>

  <text x="1027" y="198" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="27" font-weight="700" fill="#17385f">5M 精细化</text>
  <text x="1027" y="236" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#52718e">可选，不独立定方向</text>
  <text x="944" y="284" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#36536f">• 只缩小执行颗粒</text>
  <text x="944" y="318" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#36536f">• 不改变失效逻辑</text>
  <text x="944" y="352" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#36536f">• 暂不单独实盘</text>

  <line x1="310" y1="265" x2="342" y2="265" stroke="#2f5fa5" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="595" y1="265" x2="627" y2="265" stroke="#2f5fa5" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="880" y1="265" x2="912" y2="265" stroke="#2f5fa5" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="65" y="430" width="1070" height="210" rx="24" fill="#ffffff" stroke="#c4d7e5" stroke-width="2"/>
  <text x="600" y="478" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#17385f">持仓管理：不是“周期到了就平仓”</text>

  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <circle cx="175" cy="545" r="31" fill="#dcecff"/><text x="175" y="553" text-anchor="middle" font-size="22" font-weight="700" fill="#1d406c">1</text>
    <text x="175" y="600" text-anchor="middle" font-size="18" fill="#36536f">逻辑失效</text>
    <line x1="208" y1="545" x2="342" y2="545" stroke="#9ab6c8" stroke-width="4" marker-end="url(#arrow)"/>

    <circle cx="395" cy="545" r="31" fill="#dcecff"/><text x="395" y="553" text-anchor="middle" font-size="22" font-weight="700" fill="#1d406c">2</text>
    <text x="395" y="600" text-anchor="middle" font-size="18" fill="#36536f">目标到达</text>
    <line x1="428" y1="545" x2="562" y2="545" stroke="#9ab6c8" stroke-width="4" marker-end="url(#arrow)"/>

    <circle cx="615" cy="545" r="31" fill="#dff4ef"/><text x="615" y="553" text-anchor="middle" font-size="22" font-weight="700" fill="#14827b">3</text>
    <text x="615" y="600" text-anchor="middle" font-size="18" fill="#36536f">时间止损</text>
    <line x1="648" y1="545" x2="782" y2="545" stroke="#9ab6c8" stroke-width="4" marker-end="url(#arrow)"/>

    <circle cx="835" cy="545" r="31" fill="#fff0c9"/><text x="835" y="553" text-anchor="middle" font-size="22" font-weight="700" fill="#9a5b00">4</text>
    <text x="835" y="600" text-anchor="middle" font-size="18" fill="#36536f">事件风险</text>
    <line x1="868" y1="545" x2="982" y2="545" stroke="#9ab6c8" stroke-width="4" marker-end="url(#arrow)"/>

    <circle cx="1035" cy="545" r="31" fill="#fde4e4"/><text x="1035" y="553" text-anchor="middle" font-size="22" font-weight="700" fill="#a33b3b">5</text>
    <text x="1035" y="600" text-anchor="middle" font-size="18" fill="#36536f">时段结束</text>
  </g>

  <text x="600" y="687" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#657f95">默认日内研究：4H 定环境 → 1H 定场景 → 15M 等触发；5M 仅作可选精细化</text>
</svg>
