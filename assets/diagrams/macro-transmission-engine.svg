<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">宏观经济与资产价格传导链</title>
  <desc id="desc">从实体经济与冲击到政策，再到金融条件、经济结果和资产定价的反馈系统</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081321"/>
      <stop offset="1" stop-color="#101e33"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#8da5c8"/>
    </marker>
    <style>
      .title{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#f4f7fb}
      .sub{font:400 16px "Microsoft YaHei",Arial,sans-serif;fill:#9fb0c9}
      .h{font:700 21px "Microsoft YaHei",Arial,sans-serif;fill:#fff}
      .t{font:400 15px "Microsoft YaHei",Arial,sans-serif;fill:#dbe5f3}
      .small{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#9fb0c9}
      .line{fill:none;stroke:#8da5c8;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" class="title">宏观不是单线因果，而是带时滞的反馈系统</text>
  <text x="60" y="92" class="sub">先识别冲击，再判断政策与金融条件，最后才讨论资产；箭头代表常见传导，不代表必然结果。</text>

  <g filter="url(#shadow)">
    <rect x="60" y="155" width="230" height="165" rx="20" fill="#173353" stroke="#2e5e8e"/>
    <text x="85" y="192" class="h">实体经济与冲击</text>
    <text x="85" y="228" class="t">增长 · 就业 · 收入</text>
    <text x="85" y="255" class="t">供给 · 能源 · 生产率</text>
    <text x="85" y="282" class="t">通胀 · 风险事件</text>

    <rect x="355" y="155" width="230" height="165" rx="20" fill="#3d284f" stroke="#745090"/>
    <text x="380" y="192" class="h">政策反应</text>
    <text x="380" y="228" class="t">美联储：利率 / QE / QT</text>
    <text x="380" y="255" class="t">财政：税收 / 支出 / 发债</text>
    <text x="380" y="282" class="t">监管与紧急流动性</text>

    <rect x="650" y="155" width="230" height="165" rx="20" fill="#16423d" stroke="#2d7a70"/>
    <text x="675" y="192" class="h">金融条件</text>
    <text x="675" y="228" class="t">名义 / 实际利率</text>
    <text x="675" y="255" class="t">美元 · 信用 · 流动性</text>
    <text x="675" y="282" class="t">估值 · 波动 · 杠杆</text>

    <rect x="945" y="155" width="195" height="165" rx="20" fill="#50361d" stroke="#90663b"/>
    <text x="970" y="192" class="h">行为与结果</text>
    <text x="970" y="228" class="t">消费 · 投资 · 招聘</text>
    <text x="970" y="255" class="t">盈利 · 违约 · 库存</text>
    <text x="970" y="282" class="t">下期增长与通胀</text>
  </g>

  <path class="line" d="M290 238H345"/>
  <path class="line" d="M585 238H640"/>
  <path class="line" d="M880 238H935"/>
  <path d="M1042 330C1042 380 175 380 175 330" class="line" stroke-dasharray="8 8"/>
  <text x="513" y="404" class="small">反馈：政策与市场会改变下一期行为；市场也会提前交易预期</text>

  <g filter="url(#shadow)">
    <rect x="60" y="455" width="1080" height="185" rx="22" fill="#111f32" stroke="#2b405b"/>
    <text x="90" y="495" class="h">资产不是同一台机器上的同一输出</text>

    <rect x="90" y="520" width="230" height="88" rx="15" fill="#223142"/>
    <circle cx="118" cy="549" r="10" fill="#f2c14e"/>
    <text x="140" y="555" class="h">黄金</text>
    <text x="108" y="584" class="small">实际利率 · 美元 · 风险 · 央行需求</text>

    <rect x="345" y="520" width="230" height="88" rx="15" fill="#223142"/>
    <circle cx="373" cy="549" r="10" fill="#f7931a"/>
    <text x="395" y="555" class="h">BTC</text>
    <text x="363" y="584" class="small">流动性 · 现货流 · 杠杆 · 采用</text>

    <rect x="600" y="520" width="230" height="88" rx="15" fill="#223142"/>
    <circle cx="628" cy="549" r="10" fill="#63c7ff"/>
    <text x="650" y="555" class="h">美股</text>
    <text x="618" y="584" class="small">盈利 · 折现率 · 风险溢价 · 资金流</text>

    <rect x="855" y="520" width="250" height="88" rx="15" fill="#223142"/>
    <circle cx="883" cy="549" r="10" fill="#7dd181"/>
    <text x="905" y="555" class="h">原油</text>
    <text x="873" y="584" class="small">供需 · 库存 · 地缘 · 美元 · 曲线</text>
  </g>
  <text x="60" y="685" class="small">使用顺序：状态 → 预期差 → 传导 → 跨资产确认 → BTC 结构与风险管理</text>
</svg>
